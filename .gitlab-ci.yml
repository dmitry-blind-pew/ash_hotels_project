stages:
  - build
  - lint
  - format
  - migrations
  - tests
  - deploy

default:
  tags:
    - deploy

before_script:
  - echo "$ENV" > .env
  - echo "$TEST_ENV" > .env-test

build-job:
  stage: build
  script:
    - docker build -t booking_image .

Migrations-job:
  stage: migrations
  script:
    - docker run --rm --network booking_project_myNetwork --env-file .env booking_image alembic upgrade head

Tests-job:
  stage: tests
  script:
    - docker run --rm --network booking_project_myNetwork --env-file .env-test booking_image python -m pytest -s -v

deploy-job:
  stage: deploy
  before_script: []
  script:
    - cd /root/booking_project
    - git fetch origin main
    - git reset --hard origin/main
    - echo "$ENV" > .env
    - docker compose up -d --build
    - docker exec booking_nginx_container nginx -s reload
  only:
    - main

