stages:
  - build
  - lint
  - format
  - migrations
  - tests
  - deploy

default:
  tags:
    - deploy

build-job:
  stage: build
  script:
    - docker build -t booking_image .

Lint-job:
  stage: lint
  script:
    - docker run --rm booking_image python -m ruff check

Format-job:
  stage: format
  script:
    - docker run --rm booking_image python -m ruff format --check

Migrations-job:
  stage: migrations
  before_script:
    - echo "$ENV" > .env
  script:
    - docker run --rm --network booking_project_myNetwork --env-file .env booking_image alembic upgrade head

Tests-job:
  stage: tests
  before_script:
    - echo "$TEST_ENV" > .env-test
    - docker exec booking_db_container psql -U postgres -c "CREATE DATABASE test;" || true
  script:
    - docker run --rm --network booking_project_myNetwork --env-file .env-test booking_image python -m pytest -s -v

deploy-job:
  stage: deploy
  script:
    - cd /root/booking_project
    - git fetch origin main
    - git reset --hard origin/main
    - echo "$ENV" > .env
    - docker compose up -d --build
    - docker exec booking_nginx_container nginx -s reload
  only:
    - main


