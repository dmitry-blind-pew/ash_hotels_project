services:
  booking_db:
    image: postgres:16
    container_name: booking_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-1234}
      POSTGRES_DB: ${DB_NAME:-booking}
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    networks:
      - myNetwork
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-booking}"]
      interval: 5s
      timeout: 5s
      retries: 5

  booking_cache:
    image: redis:7.4
    container_name: booking_cache_container
    restart: always
    networks:
      - myNetwork

  booking_back_service:
    container_name: "booking_back_container"
    build:
      context: .
    ports:
      - "7777:8000"
    networks:
      - myNetwork
    env_file:
      - .env
    depends_on:
      booking_db:
        condition: service_healthy
      booking_cache:
        condition: service_started

  booking_celery_worker_service:
    container_name: "booking_celery_worker_container"
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: "celery --app=src.tasks.celery_application:celery_app worker -l INFO"
    depends_on:
      - booking_cache
      - booking_db

  booking_celery_beat_service:
    container_name: "booking_celery_beat_container"
    build:
      context: .
    networks:
      - myNetwork
    env_file:
      - .env
    command: "celery --app=src.tasks.celery_application:celery_app beat -l INFO"
    depends_on:
      - booking_cache

networks:
  myNetwork:
    driver: bridge

volumes:
  booking_db_data:
